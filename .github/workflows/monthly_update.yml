name: Monthly Hospital Roster Update

on:
  # Run monthly on the 16th at 9 AM UTC
  schedule:
    - cron: '0 9 16 * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  update-roster:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set date variable
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Download Hospital Roster PDF
        run: |
          curl -L -o "pdfs/hospital_roster_${{ steps.date.outputs.DATE }}.pdf" \
            "https://dhhs.ne.gov/licensure/Documents/Hospital%20Roster.pdf"

      - name: Parse PDF to CSV
        run: |
          python parse_hospital_roster.py \
            "pdfs/hospital_roster_${{ steps.date.outputs.DATE }}.pdf" \
            "data/hospital_roster_${{ steps.date.outputs.DATE }}.csv" \
            --date "${{ steps.date.outputs.DATE }}"

      - name: Display parsing results
        run: |
          echo "=== Parsing Summary ==="
          wc -l "data/hospital_roster_${{ steps.date.outputs.DATE }}.csv"
          head -5 "data/hospital_roster_${{ steps.date.outputs.DATE }}.csv"

      - name: Run tests
        run: |
          # Copy the new PDF to the expected location for tests
          cp "pdfs/hospital_roster_${{ steps.date.outputs.DATE }}.pdf" hospital_roster.pdf
          python -m pytest test_parse_hospital_roster.py -v --tb=short

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add pdfs/ data/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Monthly update: Hospital roster ${{ steps.date.outputs.DATE }}

          - Downloaded PDF from DHHS website
          - Parsed $(wc -l < "data/hospital_roster_${{ steps.date.outputs.DATE }}.csv" | tr -d ' ') hospital records
          - Added date_parsed column with value ${{ steps.date.outputs.DATE }}

          Automated by GitHub Actions"

            git push
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hospital-roster-${{ steps.date.outputs.DATE }}
          path: |
            pdfs/hospital_roster_${{ steps.date.outputs.DATE }}.pdf
            data/hospital_roster_${{ steps.date.outputs.DATE }}.csv
          retention-days: 90
